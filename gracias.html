<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Mensaje Enviado! | NeoOps AI</title>
    <link rel="icon" href="https://neoopsai.com/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-base: #fafbfc; --text-main: #111827; --text-muted: #4b5563; 
            --neon-cyan: #0284c7; --neon-purple: #7c3aed; 
            --gradient-primary: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); 
        }
        body { 
            background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; overflow: hidden;
        }
        .engineering-grid { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-size: 50px 50px; 
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px); z-index: -3; 
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.85); border: 1px solid rgba(0, 0, 0, 0.08); border-radius: 30px; 
            padding: 60px 40px; backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
            max-width: 500px; width: 90%; position: relative; z-index: 10; 
        }
        h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; margin-bottom: 15px; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 40px; line-height: 1.6; }
        .btn-glow { 
            display: inline-block; background: var(--gradient-primary); color: #fff; text-decoration: none; 
            padding: 16px 40px; border-radius: 50px; font-family: 'Outfit', sans-serif; font-weight: 700; 
            transition: all 0.4s ease; box-shadow: 0 10px 25px rgba(124, 58, 237, 0.3); 
        }
        .btn-glow:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 35px rgba(2, 132, 199, 0.4); }
        .icon-check { font-size: 5rem; margin-bottom: 20px; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        /* Círculos de fondo */
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; z-index: -1; animation: floatOrb 15s ease-in-out infinite alternate; }
        .orb-1 { top: -10%; left: -10%; width: 300px; height: 300px; background: var(--neon-cyan); }
        .orb-2 { bottom: -10%; right: -10%; width: 300px; height: 300px; background: var(--neon-purple); animation-delay: -5s; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }
    </style>
</head>
<body>
    <div class="engineering-grid"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    
    <div class="glass-card">
        <div class="icon-check">✅</div>
        <h1>¡Solicitud Recibida!</h1>
        <p>Gracias por contactar a <strong>NeoOps AI</strong>. Hemos recibido tu cuestionario con éxito. Nuestro equipo analizará la información y nos comunicaremos contigo en breve.</p>
        <a href="https://neoopsai.com" class="btn-glow">Volver al Inicio</a>
    </div>
</body>
</html>
